<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق. حساب المساحات</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#3498db">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <header class="app-bar">
        <button class="nav-btn" id="menu-toggle" onclick="toggleDarkMode()">
            <i class="fas fa-moon"></i>
        </button>
        <h1 id="page-title">حساب المساحات</h1>
        <div class="user-profile-btn" id="settings-btn" onclick="navigateTo('settings')">
            <i class="fas fa-cog"></i>
        </div>
    </header>

    <main id="main-content">
        <!-- المحتوى هيتحط هنا -->
    </main>

    <nav class="bottom-nav">
        <button class="bottom-nav-item active" onclick="navigateTo('main')" id="nav-main">
            <i class="fas fa-th-large"></i>
            <span>الرئيسية</span>
        </button>
        <button class="bottom-nav-item" onclick="navigateTo('calculator')" id="nav-calc">
            <i class="fas fa-calculator"></i>
            <span>الآلة</span>
        </button>
        <button class="bottom-nav-item" onclick="navigateTo('saved_results')" id="nav-saved">
            <i class="fas fa-history"></i>
            <span>المحفوظات</span>
        </button>
    </nav>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered!', reg))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
    <script type="module">
        import { onUserChange } from './src/state/firebase-logic.js';
        import './src/services/geometry.js';
        import './src/services/units.js';
        import { saveSession, restoreSession } from './src/app/session.js';
        import { navigateTo } from './src/app/navigation.js';

        window.toggleDarkMode = function() {
            const isDark = document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('#menu-toggle i');
            if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('darkMode', isDark);

            const currentPage = window.location.hash.replace('#', '') || 'main';
            window.updateUIState(currentPage);
        };

        window.addEventListener('resize', () => {
            const currentPage = window.location.hash.replace('#', '') || 'main';
            window.updateUIState(currentPage);
        });

        if (localStorage.getItem('darkMode') === 'true') {
            window.toggleDarkMode();
        }

        window.onpopstate = (e) => {
            const page = (e.state && e.state.page) ? e.state.page : 'main';
            navigateTo(page);
        };

        document.addEventListener('DOMContentLoaded', () => {
            const lastPage = localStorage.getItem('lastPage');
            if (lastPage) {
                navigateTo(lastPage);
            } else {
                const initialPage = window.location.hash.replace('#', '') || 'main';
                navigateTo(initialPage);
            }
        });

        const APP_JS_FILES = [
            'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
            'ui/widgets/export-image.js',
            'ui/widgets/mini-calculator.js?v=1.1',
            'ui/widgets/reset-button.js?v=1.5',
            'ui/widgets/zoom-handler.js'
        ];

        APP_JS_FILES.forEach(src => {
            const s = document.createElement('script');
            s.src = src;
            document.body.appendChild(s);
        });
    </script>
</body>
</html>
