<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Plan Analyzer</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/png" href="../icon.png">
    <meta name="theme-color" content="#3498db">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        :root {
            --primary: #007aff;
            --primary-dark: #0056b3;
            --bg-light: #f2f2f7;
            --bg-dark: #000000;
            --card-light: rgba(255, 255, 255, 0.7);
            --card-dark: rgba(28, 28, 30, 0.7);
            --text-light: #1c1c1e;
            --text-dark: #ffffff;
            --border-light: rgba(0, 0, 0, 0.1);
            --border-dark: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            background-image: radial-gradient(circle at top right, #e3f2fd, transparent),
                              radial-gradient(circle at bottom left, #fff9c4, transparent);
            background-attachment: fixed;
            color: var(--text-light);
            margin: 0;
            padding: 0;
            direction: rtl;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1a237e, transparent),
                              radial-gradient(circle at bottom left, #311b92, transparent);
            color: var(--text-dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin: 0;
            color: var(--primary);
        }

        .header p {
            color: #8e8e93;
            margin-top: 8px;
        }

        .card {
            background: var(--card-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .dark-mode .card {
            background: var(--card-dark);
            border: 1px solid var(--border-dark);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .upload-zone {
            border: 2px dashed rgba(0, 122, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0, 122, 255, 0.03);
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(0, 122, 255, 0.08);
        }

        .upload-zone i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .upload-zone h3 {
            margin: 0;
            font-size: 1.2rem;
        }

        .upload-zone p {
            color: #8e8e93;
            margin-top: 8px;
        }

        .hidden {
            display: none !important;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 14px;
            border: none;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-secondary {
            background: rgba(0,0,0,0.05);
            color: var(--text-light);
        }

        .dark-mode .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text-dark);
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 500px;
            background: #f8f9fa;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 20px;
            border: 1px solid var(--border-light);
        }

        .dark-mode .canvas-container {
            background: #1c1c1e;
            border-color: var(--border-dark);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }

        .dark-mode .progress-bar {
            background: rgba(255,255,255,0.05);
        }

        .progress-bar .fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .toolbar .btn {
            padding: 10px 16px;
            font-size: 0.85rem;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .result-card {
            background: var(--card-light);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border-light);
        }

        .dark-mode .result-card {
            background: var(--card-dark);
            border-color: var(--border-dark);
        }

        .result-card h4 {
            margin: 0 0 10px;
            font-size: 0.9rem;
            color: #8e8e93;
        }

        .result-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .measurements-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .measurements-table th,
        .measurements-table td {
            padding: 10px;
            text-align: right;
            border-bottom: 1px solid var(--border-light);
        }

        .measurements-table th {
            font-weight: 600;
            color: #8e8e93;
            font-size: 0.85rem;
        }

        .status-panel {
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .status-panel.error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        .status-panel.warning {
            background: rgba(241, 196, 15, 0.1);
            border: 1px solid rgba(241, 196, 15, 0.2);
        }

        .status-panel.success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .canvas-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-camera"></i> Survey Plan Analyzer</h1>
            <p>Upload or capture an image of a geometric plan to analyze it</p>
        </div>

        <!-- Upload Section -->
        <div class="card" id="upload-section">
            <div class="upload-zone" id="upload-zone">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Upload Image</h3>
                <p>Drag &amp; drop or click to select<br>Supports: JPG, PNG, WEBP</p>
                <input type="file" id="file-input" accept="image/*" class="hidden" multiple>
            </div>
            <div class="toolbar" style="margin-top:15px;justify-content:center;">
                <button class="btn btn-primary" id="camera-btn">
                    <i class="fas fa-camera"></i> Use Camera
                </button>
            </div>
        </div>

        <!-- Processing Section -->
        <div class="card hidden" id="processing-section">
            <h3>Processing</h3>
            <div class="progress-bar">
                <div class="fill" id="progress-fill"></div>
            </div>
            <p id="progress-text" style="text-align:center;color:#8e8e93;">Initializing...</p>
        </div>

        <!-- Canvas Section -->
        <div class="card hidden" id="canvas-section">
            <div class="toolbar">
                <button class="btn btn-secondary" id="btn-reset">
                    <i class="fas fa-undo"></i> Reset
                </button>
                <button class="btn btn-secondary" id="btn-zoom-in">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="btn btn-secondary" id="btn-zoom-out">
                    <i class="fas fa-minus"></i>
                </button>
                <button class="btn btn-primary" id="btn-analyze">
                    <i class="fas fa-magic"></i> Analyze
                </button>
                <button class="btn btn-primary hidden" id="btn-use">
                    <i class="fas fa-check"></i> Use in Calculator
                </button>
            </div>
            <div class="canvas-container">
                <canvas id="main-canvas"></canvas>
            </div>
        </div>

        <!-- Results Section -->
        <div class="card hidden" id="results-section">
            <h3>Analysis Results</h3>
            <div class="results-grid" id="results-grid"></div>
            <div id="measurements-container"></div>
            <div id="validation-panel"></div>
        </div>
    </div>

    <script type="module">
        import { SurveyAnalyzer } from '../modules/survey-analyzer/analyzer.js';

        const els = {
            uploadZone: document.getElementById('upload-zone'),
            fileInput: document.getElementById('file-input'),
            cameraBtn: document.getElementById('camera-btn'),
            uploadSection: document.getElementById('upload-section'),
            processingSection: document.getElementById('processing-section'),
            canvasSection: document.getElementById('canvas-section'),
            resultsSection: document.getElementById('results-section'),
            progressFill: document.getElementById('progress-fill'),
            progressText: document.getElementById('progress-text'),
            mainCanvas: document.getElementById('main-canvas'),
            resultsGrid: document.getElementById('results-grid'),
            measurementsContainer: document.getElementById('measurements-container'),
            validationPanel: document.getElementById('validation-panel'),
            btnAnalyze: document.getElementById('btn-analyze'),
            btnUse: document.getElementById('btn-use'),
            btnReset: document.getElementById('btn-reset')
        };

        let analyzer = null;
        let currentImage = null;

        function show(el) { el.classList.remove('hidden'); }
        function hide(el) { el.classList.add('hidden'); }

        function setProgress(value, text) {
            els.progressFill.style.width = value + '%';
            if (text) els.progressText.textContent = text;
        }

        // Initialize
        function init() {
            analyzer = new SurveyAnalyzer({
                onProgress: (value, text) => setProgress(value, text),
                onStateChange: (state, data) => handleStateChange(state, data),
                onError: (err) => console.error('Analyzer error:', err)
            });
            analyzer.init();
        }

        function handleStateChange(state, data) {
            if (state === 'complete') {
                hide(els.processingSection);
                show(els.resultsSection);
                displayResults(data);
            }
        }

        function displayResults(data) {
            if (!data || !data.shape) return;

            const shape = data.shape;
            els.resultsGrid.innerHTML = `
                <div class="result-card">
                    <h4>Shape Type</h4>
                    <div class="value">${shape.type || 'Unknown'}</div>
                </div>
                <div class="result-card">
                    <h4>Vertices</h4>
                    <div class="value">${shape.vertices?.length || 0}</div>
                </div>
                <div class="result-card">
                    <h4>Edges</h4>
                    <div class="value">${shape.edges?.length || 0}</div>
                </div>
                <div class="result-card">
                    <h4>Confidence</h4>
                    <div class="value">${(data.classification?.confidence * 100 || 0).toFixed(0)}%</div>
                </div>
            `;

            // Measurements table
            if (shape.edges?.some(e => e.measurement)) {
                const table = document.createElement('table');
                table.className = 'measurements-table';
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>Edge</th>
                            <th>Name</th>
                            <th>Length</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${shape.edges.filter(e => e.measurement).map((e, i) => `
                            <tr>
                                <td>${i + 1}</td>
                                <td>${e.name || 'Edge ' + (i + 1)}</td>
                                <td>${typeof e.measurement === 'object' ? e.measurement.value : e.measurement}m</td>
                            </tr>
                        `).join('')}
                    </tbody>
                `;
                els.measurementsContainer.innerHTML = '<h3 style="margin-top:20px;">Measurements</h3>';
                els.measurementsContainer.appendChild(table);
            }

            // Validation
            if (data.validation) {
                const v = data.validation;
                els.validationPanel.innerHTML = '';
                if (!v.isValid) {
                    els.validationPanel.innerHTML = `<div class="status-panel error">
                        <strong>Errors:</strong> ${v.errors.map(e => e.message).join(', ')}
                    </div>`;
                } else if (v.hasWarnings) {
                    els.validationPanel.innerHTML = `<div class="status-panel warning">
                        <strong>Warnings:</strong> ${v.warnings.map(w => w.message).join(', ')}
                    </div>`;
                } else {
                    els.validationPanel.innerHTML = `<div class="status-panel success">
                        <i class="fas fa-check-circle"></i> Validation passed
                    </div>`;
                }
            }
        }

        // Event Listeners
        els.uploadZone.addEventListener('click', () => els.fileInput.click());
        
        els.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            handleFile(file);
        });

        els.uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            els.uploadZone.style.borderColor = 'var(--primary)';
        });

        els.uploadZone.addEventListener('dragleave', () => {
            els.uploadZone.style.borderColor = '';
        });

        els.uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            els.uploadZone.style.borderColor = '';
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        els.cameraBtn.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*;capture=camera';
            input.onchange = (e) => {
                if (e.target.files[0]) handleFile(e.target.files[0]);
            };
            input.click();
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    show(els.canvasSection);
                    drawImageOnCanvas(img);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function drawImageOnCanvas(img) {
            const canvas = els.mainCanvas;
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            const ctx = canvas.getContext('2d');
            const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
            const x = (canvas.width - img.width * scale) / 2;
            const y = (canvas.height - img.height * scale) / 2;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
        }

        els.btnAnalyze.addEventListener('click', async () => {
            if (!currentImage) return;
            show(els.processingSection);
            setProgress(0, 'Starting analysis...');
            
            try {
                await analyzer.analyze(currentImage);
            } catch (err) {
                console.error('Analysis failed:', err);
                setProgress(0, 'Analysis failed: ' + err.message);
            }
        });

        els.btnReset.addEventListener('click', () => {
            currentImage = null;
            hide(els.canvasSection);
            hide(els.processingSection);
            hide(els.resultsSection);
            show(els.uploadSection);
            els.fileInput.value = '';
            const ctx = els.mainCanvas.getContext('2d');
            ctx.clearRect(0, 0, els.mainCanvas.width, els.mainCanvas.height);
        });

        els.btnUse.addEventListener('click', () => {
            if (!analyzer.state.shape) return;
            // Navigate to appropriate calculator page with data
            const shape = analyzer.state.shape;
            const params = new URLSearchParams();
            
            shape.edges.forEach((edge, i) => {
                if (edge.measurement) {
                    const val = typeof edge.measurement === 'object' ? edge.measurement.value : edge.measurement;
                    params.append(edge.name || `edge_${i}`, val);
                }
            });
            
            // Navigate to shape-specific calculator
            const pageMap = {
                'trapezoid': 'trapezoid',
                'square': 'square',
                'rectangle': 'rectangle',
                'triangle': 'triangle',
                'circle': 'circle_sector',
                'pentagon': 'regular_polygon',
                'hexagon': 'regular_polygon'
            };
            
            const targetPage = pageMap[shape.type] || 'all_tools';
            window.location.href = `../index.html#${targetPage}`;
        });

        window.addEventListener('resize', () => {
            if (currentImage) drawImageOnCanvas(currentImage);
        });

        // Initialize
        init();
    </script>
</body>
</html>
