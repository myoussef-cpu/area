<title>متوازي الأضلاع</title>
<div class="calc-container">
    <div class="card">
        <div class="input-group">
            <label>طول القاعدة (متر)</label>
            <input type="number" id="base" placeholder="0.00" step="any">
        </div>
        <div class="input-group">
            <label>الارتفاع (متر)</label>
            <input type="number" id="height" placeholder="0.00" step="any">
        </div>
        <button class="btn-main" onclick="calculateParallelogram()">احسب المساحة</button>
    </div>

    <div id="resultCard" class="result-card hidden"></div>
    <button class="btn-main" onclick="saveParallelogramResult()" id="saveBtn" style="display: none;">
        <i class="fas fa-save"></i> حفظ النتيجة
    </button>
</div>

<script>
    function onUnitChange(val) {
        window.setSelectedUnit('area', val || document.querySelector('.unit-selector').value);
        if (window._lastResult) renderResult(window._lastResult);
    }

    function renderResult(r) {
        const resCard = document.getElementById('resultCard');
        resCard.innerHTML = `
            <div class="result-header">
                <h3>النتيجة:</h3>
                ${window.createUnitSelectorHTML('area', 'onUnitChange')}
            </div>
            <p>المساحة: <strong>${window.formatAreaValue(r.area)}</strong></p>
        `;
        resCard.classList.remove('hidden');
        document.getElementById('saveBtn').style.display = 'block';
        window.lastCalc = { title: r.title, area: r.area, result: resCard.innerText };
    }

    function calculateParallelogram() {
        const base = parseFloat(document.getElementById('base').value);
        const height = parseFloat(document.getElementById('height').value);
        if (base > 0 && height > 0) {
            const area = base * height;
            window._lastResult = { area, title: "متوازي الأضلاع" };
            renderResult(window._lastResult);
        }
    }

    function saveParallelogramResult() {
        if (!window.lastCalc) return;
        const data = {
            type: "مساحات",
            name: window.lastCalc.title,
            area: window.lastCalc.area,
            result: window.lastCalc.result,
            timestamp: new Date().toISOString()
        };
        if (window.firebaseLogic?.saveResult) {
            window.firebaseLogic.saveResult(data).then(() => alert('تم الحفظ ✅')).catch(() => alert('تم الحفظ محلياً ✅'));
        } else {
            let s = JSON.parse(localStorage.getItem('savedResults') || '[]');
            s.push(data);
            localStorage.setItem('savedResults', JSON.stringify(s));
            alert('تم الحفظ محلياً ✅');
        }
    }
</script>
