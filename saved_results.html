<title>النتائج المحفوظة</title>

<div class="saved-results-page">
    <!-- Header Section -->
    <div class="results-header">
        <div class="header-content">
            <h1><i class="fas fa-history"></i> النتائج المحفوظة</h1>
            <p id="results-count">جاري التحميل...</p>
        </div>
        <button class="reload-btn" onclick="loadSavedResults()" title="تحديث">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>

    <!-- Sync Status Bar -->
    <div class="sync-status-bar" id="sync-status">
        <div class="status-indicator">
            <i class="fas fa-cloud"></i>
            <span>جاري التحقق...</span>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions" id="quick-actions" style="display: none;">
        <button class="action-chip" onclick="exportAllResults()">
            <i class="fas fa-share-alt"></i> تصدير الكل
        </button>
        <button class="action-chip danger" onclick="clearAllResults()">
            <i class="fas fa-trash-alt"></i> مسح الكل
        </button>
    </div>

    <!-- Results List -->
    <div id="savedResults">
        <div class="loading-state">
            <div class="loading-spinner">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>
            <p>جاري تحميل النتائج...</p>
        </div>
    </div>
</div>

<style>
    .saved-results-page {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        padding: 5px 0;
    }

    /* Header */
    .results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 16px 16px;
        margin-bottom: 8px;
    }

    .header-content h1 {
        margin: 0;
        font-size: 1.6rem;
        font-weight: 800;
        color: var(--text-light);
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .header-content h1 i {
        color: var(--primary);
        font-size: 1.4rem;
    }

    .dark-mode .header-content h1 {
        color: var(--text-dark);
    }

    .header-content p {
        margin: 4px 0 0;
        font-size: 0.85rem;
        color: #8e8e93;
        font-weight: 500;
    }

    .reload-btn {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: rgba(0, 122, 255, 0.1);
        border: none;
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        flex-shrink: 0;
    }

    .reload-btn:active {
        transform: scale(0.9) rotate(180deg);
        background: rgba(0, 122, 255, 0.2);
    }

    .reload-btn.spinning i {
        animation: spinIcon 1s linear infinite;
    }

    @keyframes spinIcon {
        100% { transform: rotate(360deg); }
    }

    /* Sync Status Bar */
    .sync-status-bar {
        margin: 0 16px 12px;
        padding: 10px 14px;
        border-radius: 14px;
        background: rgba(0, 122, 255, 0.06);
        border: 1px solid rgba(0, 122, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: all 0.3s ease;
    }

    .dark-mode .sync-status-bar {
        background: rgba(0, 122, 255, 0.1);
        border-color: rgba(0, 122, 255, 0.15);
    }

    .sync-status-bar.success {
        background: rgba(52, 199, 89, 0.08);
        border-color: rgba(52, 199, 89, 0.15);
    }

    .sync-status-bar.offline {
        background: rgba(255, 149, 0, 0.08);
        border-color: rgba(255, 149, 0, 0.15);
    }

    .status-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.82rem;
        color: #8e8e93;
        font-weight: 600;
    }

    .status-indicator i {
        font-size: 0.9rem;
    }

    .sync-status-bar.success .status-indicator {
        color: #34c759;
    }

    .sync-status-bar.offline .status-indicator {
        color: #ff9500;
    }

    /* Quick Actions */
    .quick-actions {
        display: flex;
        gap: 10px;
        padding: 0 16px 14px;
        flex-wrap: wrap;
    }

    .action-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 20px;
        border: none;
        background: rgba(0, 122, 255, 0.1);
        color: var(--primary);
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: 'Tajawal', sans-serif;
    }

    .action-chip.danger {
        background: rgba(255, 59, 48, 0.1);
        color: #ff3b30;
    }

    .action-chip:active {
        transform: scale(0.95);
    }

    /* Result Cards */
    .results-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 0 16px;
    }

    .result-card {
        background: var(--card-light);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 22px;
        padding: 18px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        animation: cardSlideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
    }

    @keyframes cardSlideIn {
        from {
            opacity: 0;
            transform: translateY(20px) scale(0.96);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .result-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--primary), #5ac8fa);
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .result-card:active::before {
        opacity: 1;
    }

    .dark-mode .result-card {
        background: var(--card-dark);
        border-color: rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .result-card:active {
        transform: scale(0.98);
    }

    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
    }

    .card-type {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .type-icon {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        background: rgba(0, 122, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
        font-size: 1rem;
        flex-shrink: 0;
    }

    .card-title {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-light);
        margin: 0;
    }

    .dark-mode .card-title {
        color: var(--text-dark);
    }

    .card-date {
        font-size: 0.78rem;
        color: #8e8e93;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 2px;
    }

    .card-date i {
        font-size: 0.7rem;
    }

    .card-result {
        background: rgba(0, 122, 255, 0.06);
        border-radius: 14px;
        padding: 12px 14px;
        margin-bottom: 10px;
    }

    .dark-mode .card-result {
        background: rgba(0, 122, 255, 0.1);
    }

    .result-value {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--primary);
        margin: 0;
    }

    .result-sub {
        font-size: 0.8rem;
        color: #8e8e93;
        margin-top: 4px;
    }

    .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
    }

    .sync-badge {
        font-size: 0.72rem;
        padding: 4px 10px;
        border-radius: 10px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .sync-badge i {
        font-size: 0.65rem;
    }

    .sync-true {
        background: rgba(52, 199, 89, 0.1);
        color: #34c759;
    }

    .sync-false {
        background: rgba(255, 149, 0, 0.1);
        color: #ff9500;
    }

    .card-actions {
        display: flex;
        gap: 8px;
    }

    .card-action-btn {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 59, 48, 0.1);
        color: #ff3b30;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .card-action-btn:active {
        transform: scale(0.9);
        background: rgba(255, 59, 48, 0.2);
    }

    .expand-icon {
        color: #c7c7cc;
        font-size: 0.8rem;
        transition: transform 0.3s ease;
    }

    .result-card.expanded .expand-icon {
        transform: rotate(180deg);
    }

    /* Details Section */
    .result-details {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        margin-top: 0;
    }

    .result-card.expanded .result-details {
        max-height: 500px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--border-light);
    }

    .dark-mode .result-card.expanded .result-details {
        border-top-color: var(--border-dark);
    }

    .details-content {
        font-size: 0.88rem;
        color: #6e6e73;
        line-height: 1.7;
        white-space: pre-line;
    }

    .dark-mode .details-content {
        color: #a1a1a6;
    }

    /* Drawing Image */
    .card-drawing {
        margin-bottom: 12px;
        border-radius: 14px;
        overflow: hidden;
        background: rgba(0, 122, 255, 0.04);
        border: 1px solid rgba(0, 122, 255, 0.08);
    }
    .card-drawing img {
        width: 100%;
        display: block;
        border-radius: 13px;
        transition: transform 0.3s ease;
        cursor: zoom-in;
    }
    .card-drawing img.zoomed {
        transform: scale(1.5);
        cursor: zoom-out;
        position: relative;
        z-index: 5;
    }

    /* Input Section */
    .input-section {
        margin-bottom: 12px;
        padding-bottom: 12px;
        border-bottom: 1px dashed var(--border-light);
    }
    .input-label {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .input-label i {
        font-size: 0.72rem;
    }
    .input-content {
        font-size: 0.82rem;
        color: #6e6e73;
        line-height: 1.6;
        white-space: pre-line;
        background: rgba(0, 122, 255, 0.04);
        padding: 8px 10px;
        border-radius: 8px;
    }
    .dark-mode .input-content {
        color: #a1a1a6;
        background: rgba(0, 122, 255, 0.08);
    }

    /* Empty State */
    .empty-state {
        text-align: center;
        padding: 60px 30px;
        animation: fadeInUp 0.6s ease;
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .empty-illustration {
        width: 120px;
        height: 120px;
        margin: 0 auto 24px;
        background: rgba(0, 122, 255, 0.06);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .empty-illustration i {
        font-size: 3rem;
        color: var(--primary);
        opacity: 0.5;
    }

    .empty-state h3 {
        margin: 0 0 8px;
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text-light);
    }

    .dark-mode .empty-state h3 {
        color: var(--text-dark);
    }

    .empty-state p {
        margin: 0;
        font-size: 0.9rem;
        color: #8e8e93;
        line-height: 1.6;
    }

    .empty-state .cta-btn {
        margin-top: 20px;
        padding: 12px 28px;
        border-radius: 14px;
        border: none;
        background: var(--primary);
        color: white;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: 'Tajawal', sans-serif;
    }

    .empty-state .cta-btn:active {
        transform: scale(0.95);
    }

    /* Loading State */
    .loading-state {
        text-align: center;
        padding: 60px 20px;
    }

    .loading-spinner {
        position: relative;
        width: 50px;
        height: 50px;
        margin: 0 auto 16px;
    }

    .spinner-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 3px solid transparent;
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spinnerRotate 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .spinner-ring:nth-child(2) {
        width: 75%;
        height: 75%;
        top: 12.5%;
        left: 12.5%;
        animation-delay: -0.15s;
        border-top-color: #5ac8fa;
    }

    .spinner-ring:nth-child(3) {
        width: 50%;
        height: 50%;
        top: 25%;
        left: 25%;
        animation-delay: -0.3s;
        border-top-color: #34c759;
    }

    @keyframes spinnerRotate {
        100% { transform: rotate(360deg); }
    }

    .loading-state p {
        font-size: 0.9rem;
        color: #8e8e93;
    }

    /* Error State */
    .error-state {
        text-align: center;
        padding: 40px 20px;
        background: rgba(255, 59, 48, 0.06);
        border-radius: 18px;
        margin: 0 16px;
    }

    .error-state i {
        font-size: 2.5rem;
        color: #ff3b30;
        margin-bottom: 12px;
        display: block;
    }

    .error-state p {
        font-size: 0.9rem;
        color: #8e8e93;
        margin: 8px 0;
    }

    .retry-btn {
        margin-top: 12px;
        padding: 10px 24px;
        border-radius: 12px;
        border: none;
        background: var(--primary);
        color: white;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        font-family: 'Tajawal', sans-serif;
    }

    /* Toast Notification */
    .toast-notification {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: rgba(28, 28, 30, 0.9);
        backdrop-filter: blur(20px);
        color: white;
        padding: 14px 24px;
        border-radius: 16px;
        font-size: 0.9rem;
        font-weight: 600;
        z-index: 10000;
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        display: flex;
        align-items: center;
        gap: 10px;
        pointer-events: none;
    }

    .toast-notification.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 480px) {
        .results-header {
            padding: 8px 14px 12px;
        }
        .header-content h1 {
            font-size: 1.35rem;
        }
        .sync-status-bar {
            margin: 0 14px 10px;
        }
        .quick-actions {
            padding: 0 14px 12px;
        }
        .results-list {
            padding: 0 14px;
        }
        .result-card {
            padding: 16px;
            border-radius: 20px;
        }
        .card-result {
            padding: 10px 12px;
        }
        .result-value {
            font-size: 1.1rem;
        }
    }
</style>

<script type="module">
    import { fetchResults } from './firebase-logic.js';

    const toolIcons = {
        'trapezoid': 'fas fa-draw-polygon',
        'triangle': 'fas fa-triangle',
        'circle_sector': 'fas fa-circle',
        'regular_polygon': 'fas fa-draw-polygon',
        'concrete_calc': 'fas fa-hard-hat',
        'land_leveling': 'fas fa-mountain',
        'volumes_3d': 'fas fa-cube',
        'calculator': 'fas fa-calculator',
        'default': 'fas fa-calculator'
    };

    async function loadSavedResults() {
        const resultsContainer = document.getElementById('savedResults');
        const syncStatus = document.getElementById('sync-status');
        const resultsCount = document.getElementById('results-count');
        const quickActions = document.getElementById('quick-actions');
        const reloadBtn = document.querySelector('.reload-btn');

        if (reloadBtn) reloadBtn.classList.add('spinning');

        if (!resultsContainer) return;

        // انتظر شوية عشان الـ Auth state يتحمل (Firebase بياخد وقت)
        await new Promise(resolve => setTimeout(resolve, 300));

        try {
            const fetchFn = window.firebaseLogic?.fetchResults || fetchResults;
            const savedResults = await fetchFn();

            // Update sync status
            if (syncStatus) {
                const isOnline = navigator.onLine;
                const hasUser = !!window.firebaseLogic?.getCurrentUser();

                if (hasUser && isOnline) {
                    syncStatus.className = 'sync-status-bar success';
                    syncStatus.innerHTML = `
                        <div class="status-indicator">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span>متزامن مع السحابة</span>
                        </div>
                    `;
                } else if (isOnline) {
                    syncStatus.className = 'sync-status-bar offline';
                    syncStatus.innerHTML = `
                        <div class="status-indicator">
                            <i class="fas fa-wifi"></i>
                            <span>متصل - سجل الدخول للمزامنة</span>
                        </div>
                    `;
                } else {
                    syncStatus.className = 'sync-status-bar offline';
                    syncStatus.innerHTML = `
                        <div class="status-indicator">
                            <i class="fas fa-cloud-download-alt"></i>
                            <span>غير متصل - النتائج محلية</span>
                        </div>
                    `;
                }
            }

            if (!savedResults || savedResults.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-illustration">
                            <i class="fas fa-folder-open"></i>
                        </div>
                        <h3>مفيش نتائج محفوظة لسه</h3>
                        <p>ابدأ احسب أي مساحة والنتائج هتتحفظ هنا تلقائيًا</p>
                        <button class="cta-btn" onclick="navigateTo('main')">
                            <i class="fas fa-plus"></i> ابدأ حساب جديد
                        </button>
                    </div>
                `;
                if (resultsCount) resultsCount.textContent = 'لا توجد نتائج';
                if (quickActions) quickActions.style.display = 'none';
                return;
            }

            // Update count
            if (resultsCount) resultsCount.textContent = `${savedResults.length} نتيجة محفوظة`;
            if (quickActions) quickActions.style.display = 'flex';

            resultsContainer.innerHTML = `
                <div class="results-list">
                    ${savedResults.map((result, index) => {
                        const type = result.type || 'حساب مساحة';
                        const mainResult = result.result || 'نتيجة غير معروفة';
                        const timestamp = result.timestamp ? new Date(result.timestamp) : null;
                        const dateStr = timestamp ? timestamp.toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric' }) : 'غير محدد';
                        const timeStr = timestamp ? timestamp.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }) : '';
                        const isSynced = result.fromCloud || result.synced;
                        const syncLabel = isSynced ? 'متزامن' : 'محلي';
                        const syncClass = isSynced ? 'sync-true' : 'sync-false';
                        const icon = toolIcons[type] || toolIcons.default;
                        const cloudId = result.id || null;

                        return `
                            <div class="result-card" style="animation-delay: ${index * 0.05}s" onclick="this.classList.toggle('expanded')">
                                <div class="card-top">
                                    <div class="card-type">
                                        <div class="type-icon"><i class="${icon}"></i></div>
                                        <div>
                                            <h3 class="card-title">${type}</h3>
                                            <div class="card-date"><i class="far fa-clock"></i> ${dateStr} - ${timeStr}</div>
                                        </div>
                                    </div>
                                    <div style="display:flex;align-items:center;gap:10px;">
                                        <i class="fas fa-chevron-down expand-icon"></i>
                                    </div>
                                </div>

                                ${result.drawing ? `
                                    <div class="card-drawing">
                                        <img src="${result.drawing}" alt="رسم توضيحي" loading="lazy" onclick="event.stopPropagation(); this.classList.toggle('zoomed')">
                                    </div>
                                ` : ''}

                                <div class="card-result">
                                    <p class="result-value">${mainResult}</p>
                                    ${result.details ? `<p class="result-sub">${result.details.split('\n')[0]}</p>` : ''}
                                </div>

                                <div class="card-footer">
                                    <span class="sync-badge ${syncClass}"><i class="fas fa-${isSynced ? 'cloud' : 'laptop'}"></i> ${syncLabel}</span>
                                    <div class="card-actions">
                                        <button class="card-action-btn" onclick="event.stopPropagation(); confirmDelete('${result.timestamp}', '${cloudId}')" title="حذف">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>

                                ${result.details || result.input ? `
                                    <div class="result-details">
                                        ${result.input ? `<div class="input-section"><div class="input-label"><i class="fas fa-keyboard"></i> المدخلات</div><div class="input-content">${result.input}</div></div>` : ''}
                                        ${result.details ? `<div class="details-content">${result.details}</div>` : ''}
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        } catch (e) {
            console.error(e);
            resultsContainer.innerHTML = `
                <div class="error-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>حصل خطأ في تحميل البيانات</p>
                    <p style="font-size: 0.8rem;">اتأكد من اتصال الإنترنت وحاول تاني</p>
                    <button class="retry-btn" onclick="loadSavedResults()">
                        <i class="fas fa-redo"></i> إعادة المحاولة
                    </button>
                </div>
            `;
        } finally {
            if (reloadBtn) reloadBtn.classList.remove('spinning');
        }
    }

    window.confirmDelete = async function(timestamp, cloudId) {
        if (confirm('هل أنت متأكد من حذف هذه النتيجة؟')) {
            try {
                const deleteFn = window.firebaseLogic?.deleteResult || window.deleteResult;
                await deleteFn(timestamp, cloudId);
                showToast('تم الحذف بنجاح', 'success');
                loadSavedResults();
            } catch (e) {
                showToast('حصل مشكلة أثناء الحذف', 'error');
            }
        }
    };

    window.exportAllResults = function() {
        const saved = JSON.parse(localStorage.getItem('savedResults') || '[]');
        if (saved.length === 0) {
            showToast('مفيش نتائج للتصدير');
            return;
        }
        const blob = new Blob([JSON.stringify(saved, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `results_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('تم التصدير بنجاح', 'success');
    };

    window.clearAllResults = function() {
        if (confirm('هل أنت متأكد من مسح جميع النتائج؟ لا يمكن التراجع.')) {
            localStorage.setItem('savedResults', '[]');
            showToast('تم مسح جميع النتائج', 'success');
            loadSavedResults();
        }
    };

    function showToast(message, type = 'info') {
        let toast = document.getElementById('toast-notification');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast-notification';
            toast.className = 'toast-notification';
            document.body.appendChild(toast);
        }
        const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
        toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0)';
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(100px)';
        }, 2500);
    }

    window.loadSavedResults = loadSavedResults;
    setTimeout(loadSavedResults, 100);

    // راقب تغيير الـ Auth state وحدث شريط المزامنة تلقائيًا
    if (window.firebaseLogic?.onUserChange) {
        window.firebaseLogic.onUserChange((user) => {
            const syncStatus = document.getElementById('sync-status');
            if (syncStatus && user) {
                syncStatus.className = 'sync-status-bar success';
                syncStatus.innerHTML = `
                    <div class="status-indicator">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span>متزامن مع السحابة — ${user.displayName || user.email}</span>
                    </div>
                `;
                // أعد تحميل النتائج عشان نجيب من السحابة
                loadSavedResults();
            }
        });
    }
</script>
