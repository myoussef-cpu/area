<title>الآلة الحاسبة</title>

<div class="calc-wrapper">
    <div class="calculator glass-body" id="calculator">
        <div class="glass-highlight"></div>

        <div class="mode-toggle">
            <button id="modeBtn" class="mode-glass" onclick="toggleMode()">
                <i class="fas fa-calculator"></i> <span>بسيطة</span>
            </button>
            <div class="mode-indicator">
                <span class="mode-dot"></span>
            </div>
        </div>

        <div class="display-container" style="view-transition-name: calc-display;">
            <div class="display-reflection"></div>
            <div class="display-shimmer"></div>
            <div class="history" id="history"></div>
            <div class="current-input" id="display">0</div>
            <div class="expression-preview" id="expressionPreview"></div>
        </div>

        <div class="sci-outer" id="sciOuter">
            <div class="scientific-buttons" id="scientificButtons">
                <div class="btn-row">
                    <button class="glass-sci" onclick="appendFunction('sin')"><span>sin</span></button>
                    <button class="glass-sci" onclick="appendFunction('cos')"><span>cos</span></button>
                    <button class="glass-sci" onclick="appendFunction('tan')"><span>tan</span></button>
                    <button class="glass-sci" onclick="appendFunction('log')"><span>log</span></button>
                    <button class="glass-sci" onclick="appendFunction('ln')"><span>ln</span></button>
                </div>
                <div class="btn-row">
                    <button class="glass-sci" onclick="appendFunction('sin\u207B\u00B9')"><span>sin⁻¹</span></button>
                    <button class="glass-sci" onclick="appendFunction('cos\u207B\u00B9')"><span>cos⁻¹</span></button>
                    <button class="glass-sci" onclick="appendFunction('tan\u207B\u00B9')"><span>tan⁻¹</span></button>
                    <button class="glass-sci" onclick="appendConstant('\u03C0')"><span>π</span></button>
                    <button class="glass-sci" onclick="appendConstant('e')"><span>e</span></button>
                </div>
                <div class="btn-row">
                    <button class="glass-sci" onclick="appendPower('\u00B2')"><span>x²</span></button>
                    <button class="glass-sci" onclick="appendPower('\u00B3')"><span>x³</span></button>
                    <button class="glass-sci" onclick="appendPower('\u207F')"><span>xⁿ</span></button>
                    <button class="glass-sci" onclick="appendFunction('\u221A')"><span>√</span></button>
                    <button class="glass-sci" onclick="appendFunction('\u221B')"><span>∛</span></button>
                </div>
                <div class="btn-row">
                    <button class="glass-sci" onclick="appendOperator('(')"><span>(</span></button>
                    <button class="glass-sci" onclick="appendOperator(')')"><span>)</span></button>
                    <button class="glass-sci" onclick="appendOperator('^')"><span>^</span></button>
                    <button class="glass-sci" onclick="appendFactorial()"><span>n!</span></button>
                    <button class="glass-sci" id="angleBtn" onclick="toggleAngleMode()"><span id="angleMode">RAD</span></button>
                </div>
            </div>
        </div>

        <div class="buttons-grid" id="basicButtons">
            <button class="glass-btn clr" onclick="clearDisplay()"><i class="fas fa-trash-alt"></i>مسح</button>
            <button class="glass-btn del" onclick="deleteLast()"><i class="fas fa-backspace"></i></button>
            <button class="glass-btn sci-tog" onclick="toggleMode()"><i class="fas fa-function"></i></button>
            <button class="glass-btn op" onclick="appendOperator('/')"><i class="fas fa-divide"></i></button>

            <button class="glass-btn num" onclick="appendNumber('7')">7</button>
            <button class="glass-btn num" onclick="appendNumber('8')">8</button>
            <button class="glass-btn num" onclick="appendNumber('9')">9</button>
            <button class="glass-btn op" onclick="appendOperator('*')"><i class="fas fa-times"></i></button>

            <button class="glass-btn num" onclick="appendNumber('4')">4</button>
            <button class="glass-btn num" onclick="appendNumber('5')">5</button>
            <button class="glass-btn num" onclick="appendNumber('6')">6</button>
            <button class="glass-btn op" onclick="appendOperator('-')"><i class="fas fa-minus"></i></button>

            <button class="glass-btn num" onclick="appendNumber('1')">1</button>
            <button class="glass-btn num" onclick="appendNumber('2')">2</button>
            <button class="glass-btn num" onclick="appendNumber('3')">3</button>
            <button class="glass-btn op" onclick="appendOperator('+')"><i class="fas fa-plus"></i></button>

            <button class="glass-btn num zero" onclick="appendNumber('0')">0</button>
            <button class="glass-btn num dot" onclick="appendNumber('.')"><i class="fas fa-circle"></i></button>
            <button class="glass-btn eq" onclick="calculate()"><i class="fas fa-equals"></i></button>
        </div>
    </div>
</div>

<style>
    .calc-wrapper {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        padding: 10px 0 20px;
    }

    .glass-body {
        position: relative;
        background: linear-gradient(
            160deg,
            rgba(255, 255, 255, 0.55) 0%,
            rgba(240, 244, 255, 0.45) 40%,
            rgba(255, 255, 255, 0.6) 100%
        );
        backdrop-filter: blur(40px) saturate(140%);
        -webkit-backdrop-filter: blur(40px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 32px;
        padding: 24px;
        box-shadow:
            0 25px 70px rgba(0, 0, 0, 0.06),
            0 8px 24px rgba(0, 0, 0, 0.04),
            0 2px 6px rgba(0, 0, 0, 0.02),
            inset 0 1px 0 rgba(255, 255, 255, 0.5);
        overflow: hidden;
        transition: background 0.3s, box-shadow 0.3s;
    }

    .dark-mode .glass-body {
        background: linear-gradient(
            160deg,
            rgba(25, 28, 38, 0.75) 0%,
            rgba(18, 22, 35, 0.65) 40%,
            rgba(28, 32, 45, 0.75) 100%
        );
        border-color: rgba(255, 255, 255, 0.06);
        box-shadow:
            0 25px 70px rgba(0, 0, 0, 0.3),
            0 8px 24px rgba(0, 0, 0, 0.2),
            inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    /* ========== Prismatic cursor light ========== */
    .glass-highlight {
        position: absolute;
        inset: -100px;
        background: radial-gradient(
            500px circle at var(--mx, 50%) var(--my, 50%),
            rgba(255, 255, 255, 0.07) 0%,
            rgba(200, 220, 255, 0.03) 30%,
            transparent 70%
        );
        pointer-events: none;
        z-index: 0;
        transition: opacity 0.4s;
        border-radius: inherit;
    }

    .dark-mode .glass-highlight {
        background: radial-gradient(
            500px circle at var(--mx, 50%) var(--my, 50%),
            rgba(120, 180, 255, 0.04) 0%,
            rgba(80, 140, 255, 0.02) 30%,
            transparent 70%
        );
    }

    /* ========== Display ========== */
    .display-container {
        position: relative;
        background: linear-gradient(
            160deg,
            rgba(8, 12, 28, 0.92) 0%,
            rgba(14, 20, 40, 0.95) 50%,
            rgba(6, 10, 24, 0.92) 100%
        );
        border-radius: 24px;
        padding: 28px 24px;
        margin-bottom: 20px;
        text-align: left;
        direction: ltr;
        overflow: hidden;
        z-index: 1;
        box-shadow:
            inset 0 4px 30px rgba(0, 0, 0, 0.5),
            inset 0 1px 0 rgba(255, 255, 255, 0.04),
            0 10px 30px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .display-reflection {
        position: absolute;
        inset: 0;
        background: linear-gradient(
            -45deg,
            transparent 25%,
            rgba(255, 255, 255, 0.015) 45%,
            rgba(255, 255, 255, 0.025) 50%,
            rgba(255, 255, 255, 0.015) 55%,
            transparent 75%
        );
        background-size: 200% 200%;
        animation: shimmerSweep 12s ease-in-out infinite;
        pointer-events: none;
        border-radius: inherit;
    }

    @keyframes shimmerSweep {
        0% { background-position: 200% 50%; }
        50% { background-position: -50% 50%; }
        100% { background-position: 200% 50%; }
    }

    .display-shimmer {
        position: absolute;
        inset: 0;
        background: radial-gradient(
            ellipse 120% 80% at 30% 20%,
            rgba(100, 160, 255, 0.03) 0%,
            transparent 60%
        );
        pointer-events: none;
        border-radius: inherit;
        animation: pulseGlow 6s ease-in-out infinite;
    }

    @keyframes pulseGlow {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
    }

    .history {
        color: rgba(180, 200, 255, 0.35);
        font-size: 0.9rem;
        min-height: 1.3rem;
        margin-bottom: 6px;
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        letter-spacing: 0.3px;
        position: relative;
        z-index: 1;
        direction: ltr;
        text-align: left;
    }

    .current-input {
        color: rgba(255, 255, 255, 0.92);
        font-size: 2.8rem;
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-weight: 400;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        position: relative;
        z-index: 1;
        text-shadow:
            0 0 40px rgba(100, 180, 255, 0.06),
            0 2px 8px rgba(0, 0, 0, 0.3);
        letter-spacing: -0.5px;
        transition: font-size 0.2s;
    }

    .expression-preview {
        color: rgba(180, 200, 255, 0.4);
        font-size: 0.95rem;
        margin-top: 6px;
        font-family: 'JetBrains Mono', monospace;
        min-height: 1.2rem;
        position: relative;
        z-index: 1;
        direction: ltr;
        text-align: left;
    }

    /* ========== Mode toggle ========== */
    .mode-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        position: relative;
        z-index: 2;
    }

    .mode-glass {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: var(--primary);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        padding: 8px 18px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        font-family: 'Tajawal', sans-serif;
        transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        position: relative;
        overflow: hidden;
    }

    .mode-glass:active {
        transform: scale(0.94);
    }

    .dark-mode .mode-glass {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.08);
        color: #5ac8fa;
    }

    .mode-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.75rem;
        color: #8e8e93;
        font-weight: 500;
        font-family: 'Tajawal', sans-serif;
    }

    .mode-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #8e8e93;
        transition: background 0.3s, box-shadow 0.3s;
    }

    body:not(.sci-mode) .mode-dot {
        background: #8e8e93;
    }

    body.sci-mode .mode-dot {
        background: #5ac8fa;
        box-shadow: 0 0 12px rgba(90, 200, 250, 0.4);
    }

    /* ========== Scientific panel ========== */
    .sci-outer {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        margin-bottom: 0;
        position: relative;
        z-index: 1;
    }

    .sci-outer.open {
        grid-template-rows: 1fr;
        margin-bottom: 16px;
    }

    .scientific-buttons {
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 6px;
        opacity: 0;
        transform: translateY(-10px);
        transition: opacity 0.4s 0.1s, transform 0.4s 0.1s;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 10px;
    }

    :not(.dark-mode) .scientific-buttons {
        background: rgba(0, 0, 0, 0.025);
        border-color: rgba(0, 0, 0, 0.06);
    }

    .dark-mode .scientific-buttons {
        background: rgba(0, 0, 0, 0.15);
        border-color: rgba(255, 255, 255, 0.04);
    }

    .sci-outer.open .scientific-buttons {
        opacity: 1;
        transform: translateY(0);
    }

    .scientific-buttons .btn-row {
        display: flex;
        gap: 6px;
    }

    .glass-sci {
        flex: 1;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        color: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 10px 2px;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.82rem;
        font-weight: 500;
        position: relative;
        overflow: hidden;
    }

    .glass-sci:active {
        transform: scale(0.92);
        background: rgba(255, 255, 255, 0.15);
    }

    :not(.dark-mode) .glass-sci {
        background: rgba(0, 0, 0, 0.04);
        color: #1c1c1e;
        border-color: rgba(0, 0, 0, 0.06);
    }

    :not(.dark-mode) .glass-sci:active {
        background: rgba(0, 0, 0, 0.07);
    }

    .dark-mode .glass-sci {
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.5);
        border-color: rgba(255, 255, 255, 0.03);
    }

    .dark-mode .glass-sci:active {
        background: rgba(255, 255, 255, 0.08);
    }

    #angleBtn {
        background: rgba(90, 200, 250, 0.08);
        border-color: rgba(90, 200, 250, 0.12);
        color: #5ac8fa;
        font-weight: 600;
    }

    .dark-mode #angleBtn {
        background: rgba(90, 200, 250, 0.06);
    }

    /* ========== Main buttons grid ========== */
    .buttons-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        position: relative;
        z-index: 1;
    }

    .glass-btn {
        border: none;
        border-radius: 18px;
        padding: 18px 0;
        font-size: 1.3rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        position: relative;
        overflow: hidden;
        font-family: 'Tajawal', sans-serif;
        transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                    background 0.2s,
                    box-shadow 0.2s;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        touch-action: manipulation;
    }

    .glass-btn:active {
        transform: scale(0.92);
    }

    .glass-btn i {
        font-size: 1.05rem;
    }

    /* === Number buttons (clear glass) === */
    .glass-btn.num {
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: #1c1c1e;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow:
            0 4px 14px rgba(0, 0, 0, 0.04),
            inset 0 1px 0 rgba(255, 255, 255, 0.5),
            inset 0 -1px 0 rgba(255, 255, 255, 0.05);
    }

    .glass-btn.num:active {
        background: rgba(255, 255, 255, 0.35);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    .dark-mode .glass-btn.num {
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.85);
        border-color: rgba(255, 255, 255, 0.06);
        border-bottom-color: rgba(255, 255, 255, 0.02);
        box-shadow:
            0 4px 14px rgba(0, 0, 0, 0.15),
            inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .dark-mode .glass-btn.num:active {
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .glass-btn.num.zero {
        grid-column: span 2;
    }

    .glass-btn.num.dot i {
        font-size: 0.6rem;
        vertical-align: middle;
    }

    /* === Operator buttons (tinted glass) === */
    .glass-btn.op {
        background: rgba(0, 122, 255, 0.06);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: var(--primary);
        border: 1px solid rgba(0, 122, 255, 0.1);
        border-bottom: 1px solid rgba(0, 122, 255, 0.04);
        box-shadow:
            0 4px 14px rgba(0, 122, 255, 0.04),
            inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .glass-btn.op:active {
        background: rgba(0, 122, 255, 0.12);
    }

    .dark-mode .glass-btn.op {
        background: rgba(90, 200, 250, 0.06);
        color: #5ac8fa;
        border-color: rgba(90, 200, 250, 0.08);
    }

    .dark-mode .glass-btn.op:active {
        background: rgba(90, 200, 250, 0.1);
    }

    /* === Equal button (deep glass) === */
    .glass-btn.eq {
        background: linear-gradient(
            145deg,
            rgba(0, 122, 255, 0.6) 0%,
            rgba(0, 100, 220, 0.5) 100%
        );
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow:
            0 6px 20px rgba(0, 122, 255, 0.2),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
        grid-column: span 2;
        font-size: 1.5rem;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    .glass-btn.eq:active {
        background: linear-gradient(
            145deg,
            rgba(0, 122, 255, 0.7) 0%,
            rgba(0, 100, 220, 0.6) 100%
        );
        box-shadow: 0 4px 12px rgba(0, 122, 255, 0.15);
    }

    .dark-mode .glass-btn.eq {
        background: linear-gradient(
            145deg,
            rgba(90, 200, 250, 0.25) 0%,
            rgba(60, 160, 220, 0.2) 100%
        );
        border-color: rgba(90, 200, 250, 0.1);
        box-shadow: 0 6px 20px rgba(90, 200, 250, 0.1);
    }

    .dark-mode .glass-btn.eq:active {
        background: linear-gradient(
            145deg,
            rgba(90, 200, 250, 0.3) 0%,
            rgba(60, 160, 220, 0.25) 100%
        );
    }

    /* === Clear button (red-tinted glass) === */
    .glass-btn.clr {
        background: rgba(255, 59, 48, 0.06);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: #ff3b30;
        border: 1px solid rgba(255, 59, 48, 0.1);
        border-bottom: 1px solid rgba(255, 59, 48, 0.04);
        box-shadow:
            0 4px 14px rgba(255, 59, 48, 0.04),
            inset 0 1px 0 rgba(255, 255, 255, 0.3);
        font-size: 1.05rem;
    }

    .glass-btn.clr:active {
        background: rgba(255, 59, 48, 0.12);
    }

    .dark-mode .glass-btn.clr {
        background: rgba(255, 105, 97, 0.06);
        color: #ff6961;
        border-color: rgba(255, 105, 97, 0.06);
    }

    .dark-mode .glass-btn.clr:active {
        background: rgba(255, 105, 97, 0.1);
    }

    /* === Delete button (amber-tinted glass) === */
    .glass-btn.del {
        background: rgba(255, 149, 0, 0.06);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: #ff9500;
        border: 1px solid rgba(255, 149, 0, 0.1);
        border-bottom: 1px solid rgba(255, 149, 0, 0.04);
        box-shadow:
            0 4px 14px rgba(255, 149, 0, 0.04),
            inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .glass-btn.del:active {
        background: rgba(255, 149, 0, 0.12);
    }

    .dark-mode .glass-btn.del {
        background: rgba(255, 180, 50, 0.06);
        color: #ffb340;
        border-color: rgba(255, 180, 50, 0.06);
    }

    .dark-mode .glass-btn.del:active {
        background: rgba(255, 180, 50, 0.1);
    }

    /* === Scientific toggle button (purple-tinted glass) === */
    .glass-btn.sci-tog {
        background: rgba(88, 86, 214, 0.06);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: #5856d6;
        border: 1px solid rgba(88, 86, 214, 0.1);
        border-bottom: 1px solid rgba(88, 86, 214, 0.04);
        box-shadow:
            0 4px 14px rgba(88, 86, 214, 0.04),
            inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .glass-btn.sci-tog:active {
        background: rgba(88, 86, 214, 0.12);
    }

    .dark-mode .glass-btn.sci-tog {
        background: rgba(120, 120, 255, 0.06);
        color: #7d7aff;
        border-color: rgba(120, 120, 255, 0.06);
    }

    .dark-mode .glass-btn.sci-tog:active {
        background: rgba(120, 120, 255, 0.1);
    }

    /* ========== Responsive ========== */
    @media (max-width: 480px) {
        .calc-wrapper { max-width: 100%; }
        .glass-body { padding: 18px; border-radius: 28px; }
        .display-container { padding: 22px 18px; border-radius: 20px; }
        .current-input { font-size: 2.2rem; }
        .buttons-grid { gap: 10px; }
        .glass-btn { padding: 15px 0; font-size: 1.15rem; border-radius: 16px; }
        .glass-btn.eq { font-size: 1.3rem; }
        .glass-btn.clr { font-size: 0.95rem; }
        .glass-sci { padding: 8px 2px; font-size: 0.75rem; border-radius: 10px; }
    }

    @media (max-width: 374px) {
        .glass-body { padding: 14px; border-radius: 24px; }
        .buttons-grid { gap: 8px; }
        .glass-btn { padding: 12px 0; font-size: 1.05rem; border-radius: 14px; }
        .current-input { font-size: 1.8rem; }
        .display-container { padding: 18px 14px; }
    }

    @media (min-width: 768px) {
        .calc-wrapper { max-width: 460px; }
        .glass-body { padding: 28px; border-radius: 36px; }
        .current-input { font-size: 3.2rem; }
        .buttons-grid { gap: 14px; }
        .glass-btn { padding: 22px 0; font-size: 1.45rem; border-radius: 20px; }
        .glass-btn.eq { font-size: 1.7rem; }
    }
</style>

<script>
    if (typeof calculatorInitialized === 'undefined') {
        let calculatorInitialized = true;

        let currentInput = '0';
        let history = '';
        let isScientific = false;
        let angleMode = 'RAD';
        let expression = '';

        const displayElement = document.getElementById('display');
        const historyElement = document.getElementById('history');
        const expressionPreview = document.getElementById('expressionPreview');

        /* ========== Prismatic light tracking ========== */
        const calc = document.getElementById('calculator');
        const highlight = calc.querySelector('.glass-highlight');

        calc.addEventListener('mousemove', (e) => {
            const r = calc.getBoundingClientRect();
            const x = ((e.clientX - r.left) / r.width) * 100;
            const y = ((e.clientY - r.top) / r.height) * 100;
            calc.style.setProperty('--mx', x + '%');
            calc.style.setProperty('--my', y + '%');
            highlight.style.opacity = '1';
        });

        calc.addEventListener('mouseleave', () => {
            highlight.style.opacity = '0';
        });

        /* ========== Display font scaling ========== */
        function adjustDisplaySize() {
            const len = currentInput.length;
            if (len > 14) displayElement.style.fontSize = '1.6rem';
            else if (len > 10) displayElement.style.fontSize = '2rem';
            else displayElement.style.fontSize = '';
        }

        function updateDisplay() {
            displayElement.textContent = currentInput;
            historyElement.textContent = history;
            expressionPreview.textContent = expression;
            adjustDisplaySize();
        }

        /* ========== Core functions ========== */
        window.appendNumber = function(num) {
            if (currentInput === '0' && num !== '.') {
                currentInput = num;
            } else {
                if (num === '.' && currentInput.includes('.')) return;
                currentInput += num;
            }
            expression += num;
            updateDisplay();
        };

        window.appendOperator = function(op) {
            const lastChar = currentInput.slice(-1);
            if (['+', '-', '*', '/', '^'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + op;
                expression = expression.slice(0, -1) + op;
            } else {
                if (currentInput === '0' && op === '-') {
                    currentInput = '-';
                    expression = '-';
                } else if (currentInput !== '0' || op === '-' || op === '(') {
                    currentInput += op;
                    expression += op;
                }
            }
            updateDisplay();
        };

        window.appendFunction = function(func) {
            const opener = func + '(';
            if (currentInput !== '0') {
                currentInput += opener;
                expression += opener;
            } else {
                currentInput = opener;
                expression = opener;
            }
            updateDisplay();
        };

        window.appendConstant = function(constant) {
            if (currentInput === '0') {
                currentInput = constant;
                expression = constant;
            } else {
                currentInput += constant;
                expression += constant;
            }
            updateDisplay();
        };

        window.appendPower = function(power) {
            if (currentInput === '0') return;
            currentInput += power;
            expression += power === '\u00B2' ? '^2' : power === '\u00B3' ? '^3' : '^';
            updateDisplay();
        };

        window.appendFactorial = function() {
            if (currentInput !== '0') {
                currentInput += '!';
                expression += '!';
                updateDisplay();
            }
        };

        window.toggleAngleMode = function() {
            if (angleMode === 'RAD') angleMode = 'DEG';
            else if (angleMode === 'DEG') angleMode = 'GRAD';
            else angleMode = 'RAD';
            document.getElementById('angleMode').textContent = angleMode;
        };

        window.clearDisplay = function() {
            currentInput = '0';
            history = '';
            expression = '';
            updateDisplay();
        };

        window.deleteLast = function() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
                expression = expression.slice(0, -1);
            } else {
                currentInput = '0';
                expression = '';
            }
            updateDisplay();
        };

        window.calculate = function() {
            try {
                let expr = expression;

                expr = expr.replace(/sin⁻¹/g, 'Math.asin');
                expr = expr.replace(/cos⁻¹/g, 'Math.acos');
                expr = expr.replace(/tan⁻¹/g, 'Math.atan');
                expr = expr.replace(/log/g, 'Math.log10');
                expr = expr.replace(/ln/g, 'Math.log');
                expr = expr.replace(/π/g, 'Math.PI');
                expr = expr.replace(/e/g, 'Math.E');
                expr = expr.replace(/√\(([^)]+)\)/g, 'Math.sqrt($1)');
                expr = expr.replace(/∛\(([^)]+)\)/g, 'Math.cbrt($1)');
                expr = expr.replace(/(\d+)!/g, (match, n) => {
                    let fact = 1;
                    for (let i = 2; i <= parseInt(n); i++) fact *= i;
                    return fact;
                });
                expr = expr.replace(/\^/g, '**');

                const result = eval(expr);
                history = expression + ' =';
                currentInput = String(Number(result.toFixed(10)));
                expression = currentInput;
                updateDisplay();
            } catch (e) {
                currentInput = 'خطأ';
                expression = '';
                updateDisplay();
                setTimeout(clearDisplay, 1500);
            }
        };

        window.toggleMode = function() {
            isScientific = !isScientific;
            const sciOuter = document.getElementById('sciOuter');
            const modeBtn = document.getElementById('modeBtn');
            const body = document.body;

            if (isScientific) {
                sciOuter.classList.add('open');
                modeBtn.innerHTML = '<i class="fas fa-calculator"></i> <span>علمية</span>';
                body.classList.add('sci-mode');
            } else {
                sciOuter.classList.remove('open');
                modeBtn.innerHTML = '<i class="fas fa-calculator"></i> <span>بسيطة</span>';
                body.classList.remove('sci-mode');
            }
        };
    }
</script>
