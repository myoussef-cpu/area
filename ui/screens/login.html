<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - تطبيق المساحات</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../styles/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
</head>
<body>
<div class="screen-login">

    <div class="login-card">
        <div class="logo-container">
            <i class="fas fa-shapes"></i>
        </div>
        <h1 id="form-title">تسجيل جديد</h1>
        <p>أنشئ حساب عشان تحفظ حساباتك وتوصلها من أي جهاز</p>

        <div class="form-group name-group" id="name-group">
            <label><i class="fas fa-user"></i> الاسم</label>
            <input type="text" id="name-input" placeholder="أدخل اسمك" autocomplete="name">
        </div>

        <div class="form-group">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <input type="email" id="email-input" placeholder="أدخل البريد الإلكتروني" autocomplete="email">
        </div>

        <div class="form-group">
            <label><i class="fas fa-lock"></i> كلمة المرور</label>
            <input type="password" id="password-input" placeholder="أدخل كلمة المرور" autocomplete="current-password">
        </div>

        <button id="submit-btn" class="submit-btn">
            <i class="fas fa-user-plus"></i> <span id="submit-text">إنشاء حساب</span>
        </button>

        <button id="toggle-btn" class="toggle-mode">عندي حساب بالفعل! تسجيل دخول</button>

        <div id="error-msg"></div>

        <a onclick="navigateTo('main')" class="back-link">الرجوع للرئيسية</a>
    </div>

    <script type="module">
        import { signupWithEmail, loginWithEmail } from '../../src/state/firebase-logic.js';

        let isLoginMode = false;

        const nameGroup = document.getElementById('name-group');
        const nameInput = document.getElementById('name-input');
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const submitBtn = document.getElementById('submit-btn');
        const submitText = document.getElementById('submit-text');
        const toggleBtn = document.getElementById('toggle-btn');
        const formTitle = document.getElementById('form-title');
        const errorMsg = document.getElementById('error-msg');

        function setMode(loginMode) {
            isLoginMode = loginMode;
            if (loginMode) {
                formTitle.textContent = 'تسجيل الدخول';
                submitText.textContent = 'دخول';
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span id="submit-text">دخول</span>';
                toggleBtn.textContent = 'ما عنديش حساب! إنشاء حساب جديد';
                nameGroup.classList.add('hidden');
            } else {
                formTitle.textContent = 'تسجيل جديد';
                submitText.textContent = 'إنشاء حساب';
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> <span id="submit-text">إنشاء حساب</span>';
                toggleBtn.textContent = 'عندي حساب بالفعل! تسجيل دخول';
                nameGroup.classList.remove('hidden');
            }
            errorMsg.style.display = 'none';
        }

        toggleBtn.addEventListener('click', () => setMode(!isLoginMode));

        submitBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const name = nameInput.value.trim();

            errorMsg.style.display = 'none';

            if (!email || !password) {
                errorMsg.textContent = 'البريد الإلكتروني وكلمة المرور مطلوبين';
                errorMsg.style.display = 'block';
                return;
            }

            if (!isLoginMode && !name) {
                errorMsg.textContent = 'الاسم مطلوب للتسجيل';
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحميل...';

            try {
                if (isLoginMode) {
                    await loginWithEmail(email, password);
                } else {
                    await signupWithEmail(name, email, password);
                }
                navigateTo('profile');
            } catch (error) {
                console.error(error);
                submitBtn.disabled = false;
                if (isLoginMode) {
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span id="submit-text">دخول</span>';
                } else {
                    submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> <span id="submit-text">إنشاء حساب</span>';
                }

                const errorCode = error.code;
                if (errorCode === 'auth/email-already-in-use') {
                    errorMsg.textContent = 'البريد الإلكتروني مستخدم من قبل، سجل دخول أو استخدم بريد آخر';
                } else if (errorCode === 'auth/user-not-found') {
                    errorMsg.textContent = 'لا يوجد حساب بهذا البريد، أنشئ حساب جديد';
                } else if (errorCode === 'auth/wrong-password') {
                    errorMsg.textContent = 'كلمة المرور غلط، حاول تاني';
                } else if (errorCode === 'auth/invalid-email') {
                    errorMsg.textContent = 'البريد الإلكتروني غير صحيح';
                } else if (errorCode === 'auth/weak-password') {
                    errorMsg.textContent = 'كلمة المرور ضعيفة، لازم 6 أحرف على الأقل';
                } else if (errorCode === 'auth/too-many-requests') {
                    errorMsg.textContent = 'حاول تاني بعد شوية، فيه طلبات كتير';
                } else {
                    errorMsg.textContent = 'حصل خطأ. اتأكد من البيانات وحاول تاني';
                }
                errorMsg.style.display = 'block';
            }
        });

        // الشيفت انتر عشان السبييد
        document.querySelectorAll('input').forEach(inp => {
            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') submitBtn.click();
            });
        });
    </script>

</div>
</body>
</html>
