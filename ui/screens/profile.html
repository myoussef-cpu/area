<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي - إعدادات المستخدم</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../styles/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
</head>
<body>
<div class="screen-profile">

    <div id="loading" class="loading">
        <i class="fas fa-spinner fa-spin fa-3x" style="color: #3498db;"></i>
    </div>

    <div class="header">
        <h1>الملف الشخصي</h1>
    </div>

    <div class="profile-container">
        <div class="profile-card">
            <img id="user-photo" src="https://via.placeholder.com/150" alt="Profile" class="avatar">
            <h2 id="user-name">ضيف</h2>
            <p id="user-email" class="email">لم يتم تسجيل الدخول</p>

            <div class="stats">
                <div class="stat-item">
                    <h3 id="calc-count">-</h3>
                    <span>حسابات محفوظة</span>
                </div>
                <div class="stat-item">
                    <h3>Pro</h3>
                    <span>نوع الحساب</span>
                </div>
            </div>

            <div class="actions">
                <a onclick="navigateTo('saved_results')" class="btn btn-saved">
                    <i class="fas fa-save"></i>
                    النتائج المحفوظة
                </a>
                <a onclick="navigateTo('main')" class="btn btn-home">
                    <i class="fas fa-home"></i>
                    الرئيسية
                </a>
                <button id="logout-btn" class="btn btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    تسجيل الخروج
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { onUserChange, logoutUser, fetchResults } from '../../src/state/firebase-logic.js';

        const loading = document.getElementById('loading');
        const userName = document.getElementById('user-name');
        const userEmail = document.getElementById('user-email');
        const userPhoto = document.getElementById('user-photo');
        const logoutBtn = document.getElementById('logout-btn');
        const calcCount = document.getElementById('calc-count');

        onUserChange(async (user) => {
            if (user) {
                userName.textContent = user.displayName;
                userEmail.textContent = user.email;
                if (user.photoURL) {
                    userPhoto.src = user.photoURL;
                }
                
                // جلب عدد الحسابات للإحصائيات
                const results = await fetchResults();
                calcCount.textContent = results.length;
            } else {
                // لو مش مسجل، رجعه لصفحة اللوجن
                navigateTo('login');
            }
            loading.style.display = 'none';
        });

        logoutBtn.addEventListener('click', () => {
            if(confirm('متأكد يا هندسة عايز تخرج؟')) {
                logoutUser();
            }
        });
    </script>
</div>
</body>
</html>
