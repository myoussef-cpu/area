    <link rel="stylesheet" href="../../../styles/styles.css">
<title>حساب المستطيل</title>
<div class="calc-container">
    <div class="card">
        <div class="input-group">
            <label>الطول (متر)</label>
            <input type="number" id="length" placeholder="0.00" step="any">
        </div>
        <div class="input-group">
            <label>العرض (متر)</label>
            <input type="number" id="width" placeholder="0.00" step="any">
        </div>
        <button class="btn-main" onclick="calculateRectangle()">احسب المساحة</button>
    </div>

    <div id="resultCard" class="result-card hidden"></div>
    <button class="btn-main" onclick="saveRectangleResult()" id="saveBtn" style="display: none;">
        <i class="fas fa-save"></i> حفظ النتيجة
    </button>
</div>

<script>
    function onUnitChange(val) {
        window.setSelectedUnit('area', val || document.querySelector('.unit-selector').value);
        if (window._lastResult) renderResult(window._lastResult);
    }

    function renderResult(r) {
        const resCard = document.getElementById('resultCard');
        resCard.innerHTML = `
            <div class="result-header">
                <h3>النتيجة:</h3>
                ${window.createUnitSelectorHTML('area', 'onUnitChange')}
            </div>
            <p>المساحة: <strong>${window.formatAreaValue(r.area)}</strong></p>
            ${r.perimeter ? `<p>المحيط: <strong>${r.perimeter.toFixed(2)} م</strong></p>` : ''}
        `;
        resCard.classList.remove('hidden');
        document.getElementById('saveBtn').style.display = 'block';
        window.lastCalc = { title: r.title, area: r.area, result: resCard.innerText };
    }

    function calculateRectangle() {
        const length = parseFloat(document.getElementById('length').value);
        const width = parseFloat(document.getElementById('width').value);
        if (length > 0 && width > 0) {
            const area = length * width;
            const perimeter = 2 * (length + width);
            window._lastResult = { area, perimeter, title: "المستطيل" };
            renderResult(window._lastResult);
        }
    }

    function saveRectangleResult() {
        if (!window.lastCalc) return;
        const data = {
            type: "مساحات",
            name: window.lastCalc.title,
            area: window.lastCalc.area,
            result: window.lastCalc.result,
            timestamp: new Date().toISOString()
        };
        if (window.firebaseLogic?.saveResult) {
            window.firebaseLogic.saveResult(data).then(() => alert('تم الحفظ ✅')).catch(() => alert('تم الحفظ محلياً ✅'));
        } else {
            let s = JSON.parse(localStorage.getItem('savedResults') || '[]');
            s.push(data);
            localStorage.setItem('savedResults', JSON.stringify(s));
            alert('تم الحفظ محلياً ✅');
        }
    }
</script>
