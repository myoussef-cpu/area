<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حجم المجسم البيضاوي (Ellipsoid) - المهندس</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <link rel="stylesheet" href="../../../styles/styles.css">
    
</head>
<body>
<div class="tool-volumes">
    <a href="#" onclick="window.navigateTo('all_tools')" class="back-btn">
        <i class="fas fa-arrow-right"></i>
        العودة للأدوات
    </a>

    <div class="calc-container">
        <div class="header">
            <i class="fas fa-egg"></i>
            <h2>حجم المجسم البيضاوي</h2>
        </div>

        <div class="input-group">
            <label>نصف المحور الأول (a)</label>
            <input type="number" id="axisA" placeholder="أدخل نصف القطر الأول" step="any">
        </div>

        <div class="input-group">
            <label>نصف المحور الثاني (b)</label>
            <input type="number" id="axisB" placeholder="أدخل نصف القطر الثاني" step="any">
        </div>

        <div class="input-group">
            <label>نصف المحور الثالث (c)</label>
            <input type="number" id="axisC" placeholder="أدخل نصف القطر الثالث" step="any">
        </div>

        <button class="btn-calc" onclick="calculateEllipsoid()">حساب الحجم</button>

        <div id="resultCard" class="result-card">
            <h3>النتائج:</h3>
            <div id="resultsList"></div>
            <button class="btn-calc save-btn" onclick="saveEllipsoidResult()">حفظ النتيجة</button>
        </div>
    </div>

    <script>
        function calculateEllipsoid() {
            const a = parseFloat(document.getElementById('axisA').value);
            const b = parseFloat(document.getElementById('axisB').value);
            const c = parseFloat(document.getElementById('axisC').value);
            
            if (a > 0 && b > 0 && c > 0) {
                const volume = (4/3) * Math.PI * a * b * c;
                
                window._lastResult = { volume, title: "المجسم البيضاوي" };
                renderVolumeResult();
                
                document.getElementById('resultCard').classList.add('show');
                
                window.lastCalc = {
                    title: "حجم المجسم البيضاوي",
                    result: `الحجم: ${volume.toFixed(2)}`,
                    date: new Date().toISOString()
                };
            } else {
                alert('يرجى إدخال قيم صحيحة للمحاور');
            }
        }

        function renderVolumeResult() {
            const r = window._lastResult;
            if (!r) return;
            const resEl = document.getElementById('resultsList');
            let html = `
                <div class="result-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                    <h3 style="margin:0;">${r.title}</h3>
                    ${window.createUnitSelectorHTML ? window.createUnitSelectorHTML('volume', 'onVolUnitChange') : ''}
                </div>
                <div class="result-item">
                    <span>الحجم الكلي:</span>
                    <span>${window.formatVolumeValue ? window.formatVolumeValue(r.volume) : r.volume.toFixed(2) + ' وحدة مكعبة'}</span>
                </div>
            `;
            resEl.innerHTML = html;
        }

        function onVolUnitChange() {
            window.setSelectedUnit('volume', document.querySelector('.unit-selector').value);
            renderVolumeResult();
        }

        function saveEllipsoidResult() {
            if (window.firebaseLogic && window.firebaseLogic.saveCalculation) {
                window.firebaseLogic.saveCalculation(window.lastCalc);
            } else {
                const saved = JSON.parse(localStorage.getItem('saved_calculations') || '[]');
                saved.push(window.lastCalc);
                localStorage.setItem('saved_calculations', JSON.stringify(saved));
                alert('تم حفظ النتيجة محلياً');
            }
        }
    </script>
</div>
</body>
</html>
