<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حجم الخزانات الكبسولية - المهندس</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <link rel="stylesheet" href="../../../styles/styles.css">
    
</head>
<body>
<div class="tool-volumes">
    <a href="#" onclick="window.navigateTo('all_tools')" class="back-btn">
        <i class="fas fa-arrow-right"></i>
        العودة للأدوات
    </a>

    <div class="calc-container">
        <div class="header">
            <i class="fas fa-capsules"></i>
            <h2>حجم الخزان الكبسولي</h2>
        </div>

        <div class="input-group">
            <label>نصف قطر النهاية الكروية (r)</label>
            <input type="number" id="radius" placeholder="أدخل نصف القطر" step="any">
        </div>

        <div class="input-group">
            <label>طول الجزء الأسطواني (L)</label>
            <input type="number" id="length" placeholder="أدخل الطول" step="any">
        </div>

        <button class="btn-calc" onclick="calculateCapsule()">حساب الحجم</button>

        <div id="resultCard" class="result-card">
            <h3>النتائج:</h3>
            <div id="resultsList"></div>
            <button class="btn-calc save-btn" onclick="saveCapsuleResult()">حفظ النتيجة</button>
        </div>
    </div>

    <script>
        function calculateCapsule() {
            const r = parseFloat(document.getElementById('radius').value);
            const L = parseFloat(document.getElementById('length').value);
            
            if (r > 0 && L >= 0) {
                // Volume of capsule = Volume of cylinder + Volume of sphere
                const cylinderVol = Math.PI * Math.pow(r, 2) * L;
                const sphereVol = (4/3) * Math.PI * Math.pow(r, 3);
                const totalVol = cylinderVol + sphereVol;
                
                window._lastResult = { totalVol, cylinderVol, sphereVol, title: "الكبسولة" };
                renderVolumeResult();
                
                document.getElementById('resultCard').classList.add('show');
                
                window.lastCalc = {
                    title: "حجم الخزان الكبسولي",
                    result: `الحجم: ${totalVol.toFixed(2)}`,
                    date: new Date().toISOString()
                };
            } else {
                alert('يرجى إدخال قيم صحيحة');
            }
        }

        function renderVolumeResult() {
            const r = window._lastResult;
            if (!r) return;
            const resEl = document.getElementById('resultsList');
            let html = `
                <div class="result-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                    <h3 style="margin:0;">${r.title}</h3>
                    ${window.createUnitSelectorHTML ? window.createUnitSelectorHTML('volume', 'onVolUnitChange') : ''}
                </div>
                <div class="result-item">
                    <span>الحجم الكلي:</span>
                    <span>${window.formatVolumeValue ? window.formatVolumeValue(r.totalVol) : r.totalVol.toFixed(2) + ' وحدة مكعبة'}</span>
                </div>
                <div class="result-item">
                    <span>حجم الجزء الأسطواني:</span>
                    <span>${window.formatVolumeValue ? window.formatVolumeValue(r.cylinderVol) : r.cylinderVol.toFixed(2) + ' وحدة مكعبة'}</span>
                </div>
                <div class="result-item">
                    <span>حجم الأطراف الكروية:</span>
                    <span>${window.formatVolumeValue ? window.formatVolumeValue(r.sphereVol) : r.sphereVol.toFixed(2) + ' وحدة مكعبة'}</span>
                </div>
            `;
            resEl.innerHTML = html;
        }

        function onVolUnitChange() {
            window.setSelectedUnit('volume', document.querySelector('.unit-selector').value);
            renderVolumeResult();
        }

        function saveCapsuleResult() {
            if (window.firebaseLogic && window.firebaseLogic.saveCalculation) {
                window.firebaseLogic.saveCalculation(window.lastCalc);
            } else {
                const saved = JSON.parse(localStorage.getItem('saved_calculations') || '[]');
                saved.push(window.lastCalc);
                localStorage.setItem('saved_calculations', JSON.stringify(saved));
                alert('تم حفظ النتيجة محلياً');
            }
        }
    </script>
</div>
</body>
</html>
