<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعداد المساعد الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
        }
        .setup-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        .setup-card h1 {
            font-size: 1.5rem;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .setup-card p {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95rem;
            line-height: 1.7;
        }
        .file-drop {
            border: 2px dashed #3498db;
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: rgba(52, 152, 219, 0.03);
        }
        .file-drop:hover, .file-drop.dragover {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.05);
        }
        .file-drop i {
            font-size: 2.5rem;
            color: #3498db;
            margin-bottom: 10px;
            display: block;
        }
        .file-drop span {
            color: #888;
            font-size: 0.9rem;
        }
        .status {
            margin: 15px 0;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
        }
        .status.success {
            display: block;
            background: rgba(46, 204, 113, 0.1);
            color: #27ae60;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }
        .status.error {
            display: block;
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.2);
        }
        .manual-input {
            margin-top: 15px;
        }
        .manual-input label {
            display: block;
            text-align: right;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .manual-input input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.3s;
        }
        .manual-input input:focus {
            border-color: #3498db;
        }
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 14px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn:hover { background: #2980b9; transform: scale(0.98); }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .btn-home {
            background: #27ae60;
            display: none;
            text-decoration: none;
        }
        .btn-home:hover { background: #219a52; }
        .or-text {
            color: #aaa;
            margin: 10px 0;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="setup-card">
        <h1><i class="fas fa-robot" style="color:#3498db;"></i> إعداد المساعد الذكي</h1>
        <p>عشان تستخدم المساعد الذكي، محتاج مفتاح NVIDIA API. اختار ملف `.env` أو أدخل المفتاح يدوياً.</p>

        <div class="file-drop" id="fileDrop">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>اضغط هنا أو اسحب ملف .env</span>
            <input type="file" id="fileInput" accept=".env,.txt" style="display:none;">
        </div>

        <div id="status" class="status"></div>

        <div class="or-text">— أو أدخل المفتاح يدوياً —</div>

        <div class="manual-input">
            <label><i class="fas fa-key"></i> NVIDIA API Key</label>
            <input type="password" id="apiKeyInput" placeholder="nvapi-..." autocomplete="off">
        </div>

        <button class="btn" onclick="saveKey()"><i class="fas fa-save"></i> حفظ المفتاح</button>
        <a class="btn btn-home" id="homeBtn" href="index.html"><i class="fas fa-home"></i> العودة للتطبيق</a>
    </div>

    <script>
        const fileDrop = document.getElementById('fileDrop');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const homeBtn = document.getElementById('homeBtn');

        // لو المفتاح محفوظ قبل كده
        const saved = localStorage.getItem('NVIDIA_API_KEY');
        if (saved) {
            apiKeyInput.value = saved;
            showStatus('المفتاح محفوظ مسبقاً!', 'success');
            homeBtn.style.display = 'inline-block';
        }

        fileDrop.addEventListener('click', () => fileInput.click());
        fileDrop.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDrop.classList.add('dragover');
        });
        fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
        fileDrop.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDrop.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                const match = content.match(/NVIDIA_API_KEY\s*=\s*(.+)/);
                if (match) {
                    const key = match[1].trim();
                    apiKeyInput.value = key;
                    localStorage.setItem('NVIDIA_API_KEY', key);
                    showStatus('تم تحميل المفتاح بنجاح!', 'success');
                    homeBtn.style.display = 'inline-block';
                } else {
                    showStatus('ملف .env مش فيه NVIDIA_API_KEY', 'error');
                }
            };
            reader.readAsText(file);
        }

        function saveKey() {
            const key = apiKeyInput.value.trim();
            if (!key) {
                showStatus('أدخل المفتاح الأول!', 'error');
                return;
            }
            localStorage.setItem('NVIDIA_API_KEY', key);
            showStatus('تم حفظ المفتاح بنجاح!', 'success');
            homeBtn.style.display = 'inline-block';
        }

        function showStatus(msg, type) {
            status.textContent = msg;
            status.className = 'status ' + type;
        }
    </script>
</body>
</html>
