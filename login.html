<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - تطبيق المساحات</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
    body {
        font-family: 'Tajawal', sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    @media (prefers-color-scheme: dark) {
        body {
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
        }
    }

    .login-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        text-align: center;
        width: 90%;
        max-width: 400px;
        animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @media (prefers-color-scheme: dark) {
        .login-card {
            background: rgba(44, 44, 46, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
    }

    @keyframes slideUp {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .logo-container {
        margin-bottom: 25px;
    }

    .logo-container i {
        font-size: 60px;
        color: #007aff;
        filter: drop-shadow(0 4px 10px rgba(0,122,255,0.3));
    }

    h1 {
        color: #1c1e21;
        margin-bottom: 15px;
        font-size: 26px;
        font-weight: 800;
    }

    @media (prefers-color-scheme: dark) {
        h1 { color: #ffffff; }
    }

    p {
        color: #3a3a3c;
        margin-bottom: 25px;
        line-height: 1.6;
        font-size: 1rem;
        opacity: 0.8;
    }

    @media (prefers-color-scheme: dark) {
        p { color: #ebebf5; }
    }

    .form-group {
        text-align: right;
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text-light);
    }

    @media (prefers-color-scheme: dark) {
        .form-group label { color: #ebebf5; }
    }

    .form-group input {
        width: 100%;
        padding: 14px 18px;
        border-radius: 16px;
        border: 1px solid rgba(0,0,0,0.08);
        background: rgba(255,255,255,0.9);
        font-family: 'Tajawal', sans-serif;
        font-size: 1rem;
        outline: none;
        transition: all 0.2s;
        box-sizing: border-box;
    }

    @media (prefers-color-scheme: dark) {
        .form-group input {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
            color: white;
        }
    }

    .form-group input:focus {
        border-color: #007aff;
        box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
    }

    .submit-btn {
        background: #007aff;
        color: white;
        border: none;
        padding: 16px;
        border-radius: 16px;
        cursor: pointer;
        font-family: 'Tajawal', sans-serif;
        font-weight: 700;
        font-size: 1.05rem;
        width: 100%;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(0,122,255,0.3);
    }

    .submit-btn:active {
        transform: scale(0.96);
        opacity: 0.9;
    }

    .submit-btn:disabled {
        opacity: 0.6;
    }

    .toggle-mode {
        color: #007aff;
        cursor: pointer;
        font-weight: 700;
        font-size: 0.9rem;
        transition: opacity 0.2s;
        border: none;
        background: none;
        font-family: 'Tajawal', sans-serif;
        margin-top: 18px;
    }

    .toggle-mode:hover {
        opacity: 0.7;
    }

    .name-group {
        transition: all 0.3s ease;
        overflow: hidden;
        max-height: 80px;
    }

    .name-group.hidden {
        max-height: 0;
        margin: 0;
        opacity: 0;
        pointer-events: none;
    }

    #error-msg {
        color: #ff3b30;
        margin-top: 15px;
        font-size: 14px;
        font-weight: 600;
        display: none;
    }

    .back-link {
        display: inline-block;
        margin-top: 20px;
        color: #007aff;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: opacity 0.2s;
    }

    .back-link:hover {
        opacity: 0.7;
    }
</style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <i class="fas fa-shapes"></i>
        </div>
        <h1 id="form-title">تسجيل جديد</h1>
        <p>أنشئ حساب عشان تحفظ حساباتك وتوصلها من أي جهاز</p>

        <div class="form-group name-group" id="name-group">
            <label><i class="fas fa-user"></i> الاسم</label>
            <input type="text" id="name-input" placeholder="أدخل اسمك" autocomplete="name">
        </div>

        <div class="form-group">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <input type="email" id="email-input" placeholder="أدخل البريد الإلكتروني" autocomplete="email">
        </div>

        <div class="form-group">
            <label><i class="fas fa-lock"></i> كلمة المرور</label>
            <input type="password" id="password-input" placeholder="أدخل كلمة المرور" autocomplete="current-password">
        </div>

        <button id="submit-btn" class="submit-btn">
            <i class="fas fa-user-plus"></i> <span id="submit-text">إنشاء حساب</span>
        </button>

        <button id="toggle-btn" class="toggle-mode">عندي حساب بالفعل! تسجيل دخول</button>

        <div id="error-msg"></div>

        <a href="index.html" class="back-link">الرجوع للرئيسية</a>
    </div>

    <script type="module">
        import { signupWithEmail, loginWithEmail } from './firebase-logic.js';

        let isLoginMode = false;

        const nameGroup = document.getElementById('name-group');
        const nameInput = document.getElementById('name-input');
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const submitBtn = document.getElementById('submit-btn');
        const submitText = document.getElementById('submit-text');
        const toggleBtn = document.getElementById('toggle-btn');
        const formTitle = document.getElementById('form-title');
        const errorMsg = document.getElementById('error-msg');

        function setMode(loginMode) {
            isLoginMode = loginMode;
            if (loginMode) {
                formTitle.textContent = 'تسجيل الدخول';
                submitText.textContent = 'دخول';
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span id="submit-text">دخول</span>';
                toggleBtn.textContent = 'ما عنديش حساب! إنشاء حساب جديد';
                nameGroup.classList.add('hidden');
            } else {
                formTitle.textContent = 'تسجيل جديد';
                submitText.textContent = 'إنشاء حساب';
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> <span id="submit-text">إنشاء حساب</span>';
                toggleBtn.textContent = 'عندي حساب بالفعل! تسجيل دخول';
                nameGroup.classList.remove('hidden');
            }
            errorMsg.style.display = 'none';
        }

        toggleBtn.addEventListener('click', () => setMode(!isLoginMode));

        submitBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const name = nameInput.value.trim();

            errorMsg.style.display = 'none';

            if (!email || !password) {
                errorMsg.textContent = 'البريد الإلكتروني وكلمة المرور مطلوبين';
                errorMsg.style.display = 'block';
                return;
            }

            if (!isLoginMode && !name) {
                errorMsg.textContent = 'الاسم مطلوب للتسجيل';
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحميل...';

            try {
                if (isLoginMode) {
                    await loginWithEmail(email, password);
                } else {
                    await signupWithEmail(name, email, password);
                }
                window.location.href = 'profile.html';
            } catch (error) {
                console.error(error);
                submitBtn.disabled = false;
                if (isLoginMode) {
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span id="submit-text">دخول</span>';
                } else {
                    submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> <span id="submit-text">إنشاء حساب</span>';
                }

                const errorCode = error.code;
                if (errorCode === 'auth/email-already-in-use') {
                    errorMsg.textContent = 'البريد الإلكتروني مستخدم من قبل، سجل دخول أو استخدم بريد آخر';
                } else if (errorCode === 'auth/user-not-found') {
                    errorMsg.textContent = 'لا يوجد حساب بهذا البريد، أنشئ حساب جديد';
                } else if (errorCode === 'auth/wrong-password') {
                    errorMsg.textContent = 'كلمة المرور غلط، حاول تاني';
                } else if (errorCode === 'auth/invalid-email') {
                    errorMsg.textContent = 'البريد الإلكتروني غير صحيح';
                } else if (errorCode === 'auth/weak-password') {
                    errorMsg.textContent = 'كلمة المرور ضعيفة، لازم 6 أحرف على الأقل';
                } else if (errorCode === 'auth/too-many-requests') {
                    errorMsg.textContent = 'حاول تاني بعد شوية، فيه طلبات كتير';
                } else {
                    errorMsg.textContent = 'حصل خطأ. اتأكد من البيانات وحاول تاني';
                }
                errorMsg.style.display = 'block';
            }
        });

        // الشيفت انتر عشان السبييد
        document.querySelectorAll('input').forEach(inp => {
            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') submitBtn.click();
            });
        });
    </script>

</body>
</html>
